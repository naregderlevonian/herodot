bindel = , XF86AudioRaiseVolume, exec, herodot audio speaker set increase
bindel = , XF86AudioLowerVolume, exec, herodot audio speaker set decrease

bindel = ALT, XF86AudioRaiseVolume, exec, herodot audio speaker set up
bindel = ALT, XF86AudioLowerVolume, exec, herodot audio speaker set down

bindel = SHIFT, XF86AudioRaiseVolume, exec, herodot audio speaker set max
bindel = SHIFT, XF86AudioLowerVolume, exec, herodot audio speaker set min

bindl = , XF86AudioMute, exec,  herodot audio speaker set toggle

